# Mosquitto MQTT Broker Configuration
# For use with Docker deployment

# Default listener
listener 1883
protocol mqtt

# WebSocket listener (for browser-based dashboard)
listener 9001
protocol websockets

# Require authentication. Every other component in this stack (telegram_bot.py,
# dashboard.jsx, esphome_presence_sensor.yaml) already connects with a
# username/password, so there's no reason to also accept anonymous
# connections - doing so means anyone on the network can publish/subscribe
# to your home automation topics without credentials.
allow_anonymous false
password_file /mosquitto/config/passwd

# Persistence
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type all

# Security
max_connections -1
max_queued_messages 1000

# Performance
message_size_limit 20000
max_inflight_messages 20
