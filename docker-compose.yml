services:
  telegram-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: family-dashboard-telegram-bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # These two are container-internal paths, not secrets, so they're set
      # here directly rather than via .env. They match the volume mounts below.
      - DB_PATH=/data/dashboard.db
      - LOG_PATH=/var/log/telegram_bot.log
    volumes:
      - ./data:/data
      - ./logs:/var/log
    networks:
      - home-automation
    depends_on:
      - mqtt
    healthcheck:
      test: ["CMD", "python", "-c", "import sqlite3; sqlite3.connect('/data/dashboard.db')"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Optional: Local MQTT broker (if not using your existing one just uncomment)
  mqtt:
    image: eclipse-mosquitto:latest
    container_name: mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
    networks:
      - home-automation
    environment:
      - TZ=UTC

  # Serves the built React dashboard (dashboard.jsx -> npm run build -> ./dashboard/build)
  # as plain static files. Point FullPageOS (or any kiosk browser) at
  # http://<this-host-ip>:8080 - not at Home Assistant's own :8123 URL.
  dashboard-web:
    image: nginx:alpine
    container_name: family-dashboard-web
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./dashboard/build:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro  # 🎯 Add this line here
    networks:
      - home-automation

networks:
  home-automation:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
