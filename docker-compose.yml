services:
  telegram-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: family-dashboard-telegram-bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DB_PATH=/data/dashboard.db
      - LOG_PATH=/var/log/telegram_bot.log
    volumes:
      - ./data:/data
      - ./logs:/var/log
      - ./meal_plan.json:/app/meal_plan.json:ro
    networks:
      - home-automation
    depends_on:
      - mqtt
    healthcheck:
      test: ["CMD", "python", "-c", "import sqlite3; sqlite3.connect('/data/dashboard.db')"]
      interval: 30s
      timeout: 10s
      retries: 3

  mqtt:
    image: eclipse-mosquitto:latest
    container_name: mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
    networks:
      - home-automation
    environment:
      - TZ=UTC

  dashboard-web:
    image: nginx:alpine
    container_name: family-dashboard-web
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./dashboard/build:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - home-automation
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  home-automation:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
